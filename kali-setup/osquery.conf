{
  "options": {
    "logger_rotate": "true"
  },

  "schedule": {
    "file_events": {
      "query": "SELECT * FROM file_events;",
      "interval": 30
    },
    "shell_history": {
      "query": "SELECT * FROM shell_history JOIN users ON users.uid = shell_history.uid WHERE users.username = 'kali';",
      "interval": 30
    },
    "file_contents": {
      "query": "SELECT * FROM file_events  JOIN file_lines  WHERE file_lines.path = target_path  AND action = 'UPDATED' AND atime != mtime AND time = (SELECT MAX(time) FROM file_events WHERE action = 'UPDATED');",
      "interval": 30
    },
    "socket_events": {
      "query": "SELECT * FROM bpf_socket_events WHERE (remote_address LIKE '%.%.%.%' OR remote_address LIKE '%:%:%') AND remote_address NOT IN ('0.0.0.0', '::', '127.0.0.1', '192.168.5.1', '51.107.3.131');",
      "interval": 30
    }
  },
  "file_paths": {
    "CTF_work_folder": [
      "/home/kali/CTF_work_folder/%%"
    ]
  },
  "exclude_paths": {

  }
}