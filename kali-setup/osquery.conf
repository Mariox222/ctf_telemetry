{
  "options": {
    "logger_rotate": "true"
  },

  "schedule": {
    // SELECT * FROM file_events;
    "file_events": {
      "query": "SELECT * FROM file_events;",
      "interval": 30
    },

    // SELECT * FROM shell_history
    // JOIN users ON users.uid = shell_history.uid
    // WHERE users.username = 'kali';
    "shell_history": {
      "query": "SELECT * FROM shell_history JOIN users ON users.uid = shell_history.uid WHERE users.username = 'kali';",
      "interval": 30
    },

    // SELECT * FROM file_events
    // JOIN file_lines ON file_lines.path = target_path
    // WHERE action = 'UPDATED'
    //   AND atime != mtime
    //   AND (target_path LIKE '%.py' OR target_path LIKE '%.sh'
    //     OR target_path LIKE '%.txt' OR target_path LIKE '%.c'
    //     OR target_path LIKE '%.cpp' OR target_path LIKE '%.md'
    //     OR target_path LIKE '%.js' OR target_path LIKE '%.rb'
    //     OR target_path LIKE '%.pl' OR target_path LIKE '%.html'
    //     OR target_path LIKE '%.php' OR target_path LIKE '%.xml'
    //     OR target_path LIKE '%.json' OR target_path LIKE '%.csv'
    //     OR target_path LIKE '%.pem' OR target_path LIKE '%.key');
    "file_contents": {
      "query": "SELECT * FROM file_events JOIN file_lines WHERE file_lines.path = target_path AND action = 'UPDATED' AND atime != mtime AND (target_path LIKE '%.py' OR target_path LIKE '%.sh' OR target_path LIKE '%.txt' OR target_path LIKE '%.c' OR target_path LIKE '%.cpp' OR target_path LIKE '%.md' OR target_path LIKE '%.js' OR target_path LIKE '%.rb' OR target_path LIKE '%.pl' OR target_path LIKE '%.html' OR target_path LIKE '%.php' OR target_path LIKE '%.xml' OR target_path LIKE '%.json' OR target_path LIKE '%.csv' OR target_path LIKE '%.pem' OR target_path LIKE '%.key');",
      "interval": 30
    },

    // SELECT * FROM bpf_socket_events
    // WHERE (remote_address LIKE '%.%.%.%' OR remote_address LIKE '%:%:%')
    //   AND remote_address NOT IN (
    //     '0.0.0.0',       -- invalid
    //     '::',            -- IPv6 unspecified
    //     '127.0.0.1',     -- localhost
    //     '192.168.5.1',   -- local router
    //     '51.107.3.131'   -- elastic server
    //   );
    "socket_events": {
      "query": "SELECT * FROM bpf_socket_events WHERE (remote_address LIKE '%.%.%.%' OR remote_address LIKE '%:%:%') AND remote_address NOT IN ('0.0.0.0', '::', '127.0.0.1', '192.168.5.1', '51.107.3.131');",
      "interval": 30
    }
  },

  "file_paths": {
    "CTF_work_folder": [
      "/home/kali/CTF_work_folder/%%"
    ]
  },

  "exclude_paths": {

  }
}